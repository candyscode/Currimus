name: Currimus
options:
  deploymentTarget:
    iOS: "26.0"
    watchOS: "11.0"
  createIntermediateGroups: true
settings:
  base:
    # Swift 6 language mode. The project targets iOS 26 / watchOS 11, so there
    # is no runtime reason to stay on 5.10 — and 5.10 hid a real data race on
    # the WatchConnectivity callbacks, which are written on the main actor and
    # were being read from the delegate's background queue.
    SWIFT_VERSION: "6.0"
    SWIFT_STRICT_CONCURRENCY: complete
    # Extract every user-facing literal into Resources/Localizable.xcstrings.
    # SwiftUI Text literals are already localization keys; this makes them
    # (and String(localized:) call sites) show up in the catalogue.
    SWIFT_EMIT_LOC_STRINGS: YES
    GENERATE_INFOPLIST_FILE: YES
    # The app uses no encryption beyond what iOS itself provides over HTTPS —
    # in fact it makes no network calls at all. Declaring it here answers the
    # export-compliance question once, instead of on every single upload.
    INFOPLIST_KEY_ITSAppUsesNonExemptEncryption: NO
    CODE_SIGN_STYLE: Automatic
    # The project file is generated, so anything set by hand in Xcode's
    # Signing & Capabilities pane survives exactly until the next
    # `xcodegen generate`. The team belongs here or it does not persist —
    # and HealthKit cannot be built onto a device without it.
    DEVELOPMENT_TEAM: 88U4UH4ASG
    CURRENT_PROJECT_VERSION: 1
    MARKETING_VERSION: "1.0"
    ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon

targets:
  Currimus:
    type: application
    platform: iOS
    sources:
      - iOS
      - Shared
      - path: Fonts
        buildPhase: resources
      - path: Resources/Localizable.xcstrings
        buildPhase: resources
      # Required since May 2024. Both apps and the widget read UserDefaults,
      # which is a required-reason API; without a manifest declaring it the
      # upload is answered with ITMS-91053.
      - path: Resources/PrivacyInfo.xcprivacy
        buildPhase: resources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.currimus.app
        INFOPLIST_KEY_CFBundleDisplayName: Currimus
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UIUserInterfaceStyle: Dark
        INFOPLIST_KEY_UISupportedInterfaceOrientations: UIInterfaceOrientationPortrait
        # Read only. The iPhone never writes to Health — the watch saves the
        # workout, and this app reads runs other apps recorded. Declaring a
        # write description it does not use invites a review question with no
        # good answer.
        INFOPLIST_KEY_NSHealthShareUsageDescription: "Currimus reads your running workouts from Apple Health, so every total counts what you actually ran."
        TARGETED_DEVICE_FAMILY: "1"
    entitlements:
      path: iOS/Currimus.entitlements
      properties:
        com.apple.developer.healthkit: true
        com.apple.developer.healthkit.access: []
        com.apple.security.application-groups: [group.com.currimus.app]
    dependencies:
      - target: CurrimusWatch

  CurrimusWatch:
    type: application
    platform: watchOS
    sources:
      - Watch
      - Shared
      - path: Fonts
        buildPhase: resources
      - path: Resources/Localizable.xcstrings
        buildPhase: resources
      # Required since May 2024. Both apps and the widget read UserDefaults,
      # which is a required-reason API; without a manifest declaring it the
      # upload is answered with ITMS-91053.
      - path: Resources/PrivacyInfo.xcprivacy
        buildPhase: resources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.currimus.app.watchkitapp
        INFOPLIST_KEY_CFBundleDisplayName: Currimus
        INFOPLIST_KEY_NSHealthShareUsageDescription: "Currimus reads heart rate and distance to show live pace and zones during your run."
        INFOPLIST_KEY_NSHealthUpdateUsageDescription: "Currimus saves your runs as workouts to Apple Health."
        INFOPLIST_KEY_NSLocationWhenInUseUsageDescription: "Currimus uses GPS to record your route, distance and elevation while you run."
    # WKBackgroundModes is an array; the INFOPLIST_KEY_ shorthand silently
    # dropped it, so the app was suspended the moment it left the foreground
    # mid-run. A real plist is the only reliable way to declare it.
    info:
      path: Watch/Info.plist
      properties:
        # Both were literals here, so the watch app stayed on 1.0/1 while the
        # iPhone app followed MARKETING_VERSION. App Store Connect rejects a
        # bundle whose embedded watch app disagrees with it.
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        WKApplication: true
        WKCompanionAppBundleIdentifier: com.currimus.app
        # `location` alongside the workout mode: the workout session keeps the
        # app alive, but CoreLocation still refuses to deliver fixes in the
        # background without its own declaration — and
        # `allowsBackgroundLocationUpdates` traps at runtime if it is missing.
        WKBackgroundModes: [workout-processing, location]
        WKSupportsAlwaysOnDisplay: true
        CFBundleDisplayName: Currimus
    entitlements:
      path: Watch/CurrimusWatch.entitlements
      properties:
        com.apple.developer.healthkit: true
        com.apple.developer.healthkit.access: []
        com.apple.security.application-groups: [group.com.currimus.app]
    dependencies:
      - target: CurrimusWatchWidgets

  CurrimusWatchWidgets:
    type: app-extension
    platform: watchOS
    sources:
      - WatchWidgets
      - Shared
      - path: Fonts
        buildPhase: resources
      - path: Resources/PrivacyInfo.xcprivacy
        buildPhase: resources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.currimus.app.watchkitapp.widgets
        INFOPLIST_KEY_CFBundleDisplayName: Currimus
    entitlements:
      path: WatchWidgets/CurrimusWatchWidgets.entitlements
      properties:
        com.apple.security.application-groups: [group.com.currimus.app]
    info:
      path: WatchWidgets/Info.plist
      properties:
        CFBundleDisplayName: Currimus
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension

  CurrimusTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      # UISnapshots holds the UI-regression harness's golden PNGs and its
      # scratch output — data for scripts/ui-snapshot.sh, not the XCTest bundle.
      # Without this exclude xcodegen copies them in as resources, and the
      # ios/watch/_work copies collide on basename ("multiple commands produce").
      - path: Tests
        excludes:
          - "UISnapshots/**"
      - Shared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.currimus.app.tests
        GENERATE_INFOPLIST_FILE: YES
